name: Daily Recalculation

on:
  schedule:
    # 02:00 UTC каждый день
    - cron: '0 2 * * *'
  # Ручной запуск из вкладки Actions
  workflow_dispatch:

jobs:
  recalculate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger recalculation via API
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            "https://peace-index-180.vercel.app/api/recalculate?secret=${{ secrets.CRON_SECRET }}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error: HTTP $HTTP_CODE"
            exit 1
          fi
          
          # Проверяем, что пересчёт действительно запустился
          if echo "$BODY" | grep -q '"ok":false'; then
            echo "Recalculation failed: $BODY"
            exit 1
          fi
          
          echo "Recalculation started successfully"
