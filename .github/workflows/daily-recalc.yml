# .github/workflows/daily-recalc.yml — ФИНАЛЬНАЯ ВЕРСИЯ
name: Daily Recalculation

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force recalculation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  recalculate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Push database schema
        run: bun run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run recalculation
        run: |
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            bun run recalculate --force
          else
            bun run recalculate
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
