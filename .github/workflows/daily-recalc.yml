# .github/workflows/daily-recalc.yml — ФИНАЛЬНАЯ ВЕРСИЯ
name: Daily Recalculation

on:
  # Триггер в 05:37 UTC.
  #
  # ПОЧЕМУ ИМЕННО ТАК:
  # 1. Массированные удары чаще всего происходят ночью/рано утром по Киеву
  #    (~02:00–05:00). Новости об этом (Reuters/AP/Ukrainska Pravda и т.д.)
  #    обычно публикуются и индексируются в течение 1–3 часов после события.
  #    05:37 UTC = 08:37 Kyiv (лето, UTC+3) / 07:37 Kyiv (зима, UTC+2,
  #    после перевода часов 25 октября 2026) — этого запаса обычно достаточно,
  #    чтобы утренний удар уже попал в новостную выдачу.
  # 2. GitHub Actions НЕ гарантирует точное время срабатывания cron — по
  #    наблюдениям в этом репозитории задержка составляла от ~1.5 до ~3.7 часов
  #    (см. историю ранов Daily Recalculation #35–#38). С учётом этой задержки
  #    реальный запуск ожидается ориентировочно в 10:00–12:30 по Киеву летом.
  # 3. Минута намеренно НЕ круглая (37, а не 0/15/30/45) — по опыту сообщества
  #    GitHub Actions это немного снижает очередь и задержку, так как меньше
  #    workflow триггерятся ровно в ту же минуту по всему GitHub.
  #
  # ВАЖНО: гарантий по времени всё равно нет. Если через несколько дней
  # реальное время запуска (смотреть в Actions → Daily Recalculation) будет
  # систематически сильно не в диапазоне 10:00–12:00, минуту/час можно
  # подвинуть ещё раз по тому же принципу.
  schedule:
    - cron: '37 5 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force recalculation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  recalculate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Push database schema
        run: bun run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run recalculation
        run: |
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            bun run recalculate --force
          else
            bun run recalculate
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
